<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

   <!-- Login Form Container -->
   <div class="login-container">
    <div class="form-box">
        <h1>Admin Login</h1>

        <!-- Login Form -->
        <form id="adminLoginForm">
            <!-- Email Input -->
            <input type="email" id="email" name="email" placeholder="Email" required><br>

            <!-- Password Input with Toggle Eye Icon -->
            <div class="password-container">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fas fa-eye toggle-password" id="togglePassword"></i>
            </div>
            
            <!-- Login Button -->
            <button type="submit">Login</button>

            <!-- Forgot Password Link -->
            <div class="forgot-password">
                <a href="#" id="forgotPasswordLink">Forgot Password?</a>
            </div>
        </form>

        <!-- Feedback Message -->
        <div id="message"></div>
    </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotPasswordModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Forgot Password</h2>
            <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body">
            <p>Please enter your registered email address:</p>
            <form id="forgotPasswordForm">
                <input type="email" id="forgotEmail" placeholder="Email" required><br>
                <button type="submit">Send Reset Link</button>
            </form>
        </div>
    </div>
</div>

<!-- Message Modal for Feedback -->
<div id="messageModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close">&times;</span>
        </div>
        <div class="modal-body">
            <p id="messageText"></p>
        </div>
    </div>
</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Function to show a modal with a message
            function showModal(message, color) {
                const modal = document.getElementById('messageModal');
                const messageText = document.getElementById('messageText');
                messageText.textContent = message;
                messageText.style.color = color;

    
                modal.style.display = 'block';
                modal.classList.add('fade-in');
    
                // Automatically close the modal after 1.5 seconds if successful
                if (color === 'green') {
                    setTimeout(() => {
                        modal.classList.remove('fade-in');
                        modal.classList.add('fade-out');
                        setTimeout(() => {
                            modal.style.display = 'none';
                            modal.classList.remove('fade-out');
                        }, 300); // Faster fade-out
                    }, 1500); // 1.5 seconds
                }
            }

            // Handle Forgot Password modal display
            const forgotPasswordModal = document.getElementById('forgotPasswordModal');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');
            const closeForgotModal = document.querySelector('.close-modal');

            forgotPasswordLink.addEventListener('click', () => {
                forgotPasswordModal.style.display = 'block';
                forgotPasswordModal.classList.add('fade-in'); // Fade-in when modal is shown
                togglePassword.style.display = 'none';

            });

            closeForgotModal.addEventListener('click', () => {
                forgotPasswordModal.classList.remove('fade-in');
                forgotPasswordModal.classList.add('fade-out');
                togglePassword.style.display = 'inline';





                setTimeout(() => {
                    forgotPasswordModal.style.display = 'none';
                    forgotPasswordModal.classList.remove('fade-out');
                }, 300);
            });

            // Handle Forgot Password form submission
            const forgotPasswordForm = document.getElementById('forgotPasswordForm');
            forgotPasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('forgotEmail').value;

                const response = await fetch('/admin/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (response.ok) {
                    showModal("A password reset link has been sent to your email.", "green");
                    forgotPasswordModal.classList.remove('fade-in');
                    forgotPasswordModal.classList.add('fade-out');
                    setTimeout(() => {
                        forgotPasswordModal.style.display = 'none';
                        forgotPasswordModal.classList.remove('fade-out');
                    }, 300); // Close modal after fade-out
                } else if (response.status === 404) {
                    showModal(result.message || "Admin with this email not found.", "red");
                } else {
                    showModal(result.message || "Error sending reset link. Please try again.", "red");
                }
            });

            // Handle Admin Login form submission
            document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const response = await fetch('/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    showModal("Login Successful!", "green");
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard';
                    }, 1800); // Redirect after modal fades out
                } else if (response.status === 401) {
                    showModal(result.message || "Invalid credentials. Please try again.", "red");
                } else if (response.status === 404) {
                    showModal(result.message || "Admin not found. Please check your email.", "red");
                } else {
                    showModal(result.message || "An unexpected error occurred. Please try again later.", "red");
                }
            });

            // Close feedback modal when the close button is clicked
            const closeButton = document.querySelector(".close");
            if (closeButton) {
                closeButton.addEventListener("click", function() {
                    const modal = document.getElementById("messageModal");
                    modal.style.display = 'none';
                    modal.classList.remove('fade-in');
                    modal.classList.remove('fade-out');
                });
            }

            // Close modals if user clicks outside
            window.addEventListener('click', function(event) {
                const modal = document.querySelector('.modal');
                if (event.target === modal) {
                    modal.classList.remove('fade-in');
                    modal.classList.add('fade-out');
                    setTimeout(() => {
                        modal.style.display = 'none';
                        modal.classList.remove('fade-out');
                    }, 300);
                }
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
    const togglePassword = document.querySelector("#togglePassword");
    const passwordField = document.querySelector("#password");

    togglePassword.addEventListener("click", function () {
        // Toggle the type attribute of the password field
        const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
        passwordField.setAttribute("type", type);

        // Toggle the eye icon class between fa-eye and fa-eye-slash
        this.classList.toggle("fa-eye-slash");
    });
});

    </script>

    <style>
        /* Add consistent modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4); /* Dark background */
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 400px;
            transition: all 0.3s ease-in-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close, .close-modal {
            cursor: pointer;
            font-size: 20px;
        }

        .modal-body {
            padding: 10px 0;
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .fade-out {
            opacity: 1;
            animation: fadeOut 0.3s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
            }
        }
    </style>

</body>
</html>
