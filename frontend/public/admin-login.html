<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>



    <div class="login-container">
        <div class="form-box">
            <h1>Admin Login</h1>
    
            <form id="adminLoginForm">
                <!-- Email Input with Placeholder -->
                <input type="email" id="email" name="email" placeholder="Email" required><br>
    
                <!-- Password Input with Placeholder -->
                <input type="password" id="password" name="password" placeholder="Password" required><br>
    
                <!-- Login Button -->
                <button type="submit">Login</button>
            </form>
    
            <div id="message"></div>
        </div>
    </div>
    






   <!-- Enhanced Modal for displaying messages -->
   <div id="messageModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span class="close">&times;</span>
         
        </div>
        <div class="modal-body">
            <p id="messageText"></p>
        </div>
        <div class="modal-footer">
            <button id="closeBtn">Try Agian</button>
        </div>
    </div>
</div>

    <script>
        // Handle form submission
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();
            
            // Display the message in the modal
            const modal = document.getElementById('messageModal');
            const messageText = document.getElementById('messageText');
            messageText.textContent = result.message;
            modal.style.display = "block";

            if (response.ok) {
                messageText.textContent = "Login Successful!";
                messageText.style.color = "green";
                window.location.href = '/admin/dashboard';
            } else {
                messageText.textContent = "Login Unsuccessful";
                messageText.style.color = "red";
            }
        });

        // Close the modal when the user clicks the close button
        document.querySelector(".close").addEventListener("click", function() {
            document.getElementById("messageModal").style.display = "none";
        });

        // Close the modal if the user clicks anywhere outside of it
        window.onclick = function(event) {
            const modal = document.getElementById('messageModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        };
    
    </script>
</body>
</html>
