<!DOCTYPE html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <div class="login-container">
        <div class="form-box">
            <h1>Admin Login</h1>
    
            <form id="adminLoginForm">
                <!-- Email Input with Placeholder -->
                <input type="email" id="email" name="email" placeholder="Email" required><br>
    
                <!-- Password Input with Placeholder -->
                <input type="password" id="password" name="password" placeholder="Password" required><br>
    
                <!-- Login Button -->
                <button type="submit">Login</button>
            </form>

            <!-- Forgot Password Link -->
            <div class="forgot-password">
                <a href="#" id="forgotPasswordLink">Forgot Password?</a>
            </div>
    
            <div id="message"></div>
        </div>
    </div>

    <!-- Enhanced Modal for displaying messages -->
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <p id="messageText"></p>
            </div>
        </div>
    </div>

    <script>
        // Show the modal
        function showModal(message, color) {
            const modal = document.getElementById('messageModal');
            const messageText = document.getElementById('messageText');
            messageText.textContent = message;
            messageText.style.color = color;
    
            modal.style.display = 'block';
            modal.classList.add('fade-in');
    
            // Automatically close the modal after 1.5 seconds if successful
            if (color === 'green') {
                setTimeout(() => {
                    modal.classList.remove('fade-in');
                    modal.classList.add('fade-out');
                    setTimeout(() => {
                        modal.style.display = 'none';
                        modal.classList.remove('fade-out');
                    }, 100); // Faster fade-out
                }, 1500); // 1.5 seconds
            }
        }
    
        // Handle form submission
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
    
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
    
            const response = await fetch('/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });
    
            const result = await response.json();
            
            if (response.ok) {
                showModal(result.message || "Login Successful!", "green");
                setTimeout(() => {
                    window.location.href = '/admin/dashboard';
                }, 1800); // Redirect after the modal fades out quickly
            } else {
                // Show specific error message
                showModal(result.message || "Login Unsuccessful", "red");
            }
        });
        // Function to close the modal
function closeModal() {
    const modal = document.getElementById("messageModal");
    modal.classList.remove('fade-in');
    modal.classList.add('fade-out');
    setTimeout(() => {
        modal.style.display = 'none';
        modal.classList.remove('fade-out');
    }, 100);
}

// Attach event listener to the close button
document.querySelector(".close").addEventListener("click", closeModal);

// Close the modal if the user clicks anywhere outside of it
window.onclick = function(event) {
    const modal = document.getElementById('messageModal');
    if (event.target == modal) {
        closeModal();  // Call the closeModal function if clicked outside the modal
    }
};
    </script>
    
</body>
</html>
