<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="login-container">
        <div class="form-box">
            <h1>Tutor Login</h1>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required><br>
                <div class="password-container">
                    <input type="password" id="loginPassword" placeholder="Password" required><i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>    
                            <button type="submit">Login</button>
                
            </form>

            <!-- Forgot Password Link -->
            <div class="forgot-password">
                <a href="#" id="forgotPasswordLink">Forgot Password?</a>
            </div>
    
            <div id="message"></div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Forgot Password</h2>
                <span class="close-modal">&times;</span>
            </div>
            <div class="modal-body">
                <p>Please enter your registered email address:</p>
                <form id="forgotPasswordForm">
                    <input type="email" id="forgotEmail" placeholder="Email" required><br>
                    <button type="submit">Send Reset Link</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Feedback Modal for displaying messages -->
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="close">&times;</span>
            </div>
            <div class="modal-body">
                <p id="messageText"></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Function to show a modal with a message
            function showModal(message, color) {
                const modal = document.getElementById('messageModal');
                const messageText = document.getElementById('messageText');
                messageText.textContent = message;
                messageText.style.color = color;
    
                modal.style.display = 'block';
                modal.classList.add('fade-in');
    
                // Automatically close the modal after 1.5 seconds if successful
                if (color === 'green') {
                    setTimeout(() => {
                        modal.classList.remove('fade-in');
                        modal.classList.add('fade-out');
                        setTimeout(() => {
                            modal.style.display = 'none';
                            modal.classList.remove('fade-out');
                        }, 300); // Faster fade-out
                    }, 1500); // 1.5 seconds
                }
            }

            // Handle Forgot Password modal display
            const forgotPasswordModal = document.getElementById('forgotPasswordModal');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');
            const closeForgotModal = document.querySelector('.close-modal');

            forgotPasswordLink.addEventListener('click', () => {
                forgotPasswordModal.style.display = 'block';
                forgotPasswordModal.classList.add('fade-in'); // Fade-in when modal is shown
            });

            closeForgotModal.addEventListener('click', () => {
                forgotPasswordModal.classList.remove('fade-in');
                forgotPasswordModal.classList.add('fade-out');
                setTimeout(() => {
                    forgotPasswordModal.style.display = 'none';
                    forgotPasswordModal.classList.remove('fade-out');
                }, 300);
            });

            // Handle Forgot Password form submission
            const forgotPasswordForm = document.getElementById('forgotPasswordForm');
            forgotPasswordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('forgotEmail').value;

                const response = await fetch('/tutors/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (response.ok) {
                    showModal("A password reset link has been sent to your email.", "green");
                    forgotPasswordModal.classList.remove('fade-in');
                    forgotPasswordModal.classList.add('fade-out');
                    setTimeout(() => {
                        forgotPasswordModal.style.display = 'none';
                        forgotPasswordModal.classList.remove('fade-out');
                    }, 300); // Close modal after fade-out
                } else if (response.status === 404) {
                    showModal(result.message || "Tutor with this email not found.", "red");
                } else {
                    showModal(result.message || "Error sending reset link. Please try again.", "red");
                }
            });

            // Handle Tutor Login form submission
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('loginEmail').value;
const password = document.getElementById('loginPassword').value;


                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok) {
                    showModal("Login Successful!", "green");
                    setTimeout(() => {
                        window.location.href = '/tutordashboard.html';
                    }, 1800); // Redirect after modal fades out
                } else if (response.status === 401) {
                    showModal(result.message || "Invalid credentials. Please try again.", "red");
                } else if (response.status === 404) {
                    showModal(result.message || "Tutor not found. Please check your email.", "red");
                } else {
                    showModal(result.message || "An unexpected error occurred. Please try again later.", "red");
                }
            });

            // Close feedback modal when the close button is clicked
            const closeButton = document.querySelector(".close");
            if (closeButton) {
                closeButton.addEventListener("click", function() {
                    const modal = document.getElementById("messageModal");
                    modal.style.display = 'none';
                    modal.classList.remove('fade-in');
                    modal.classList.remove('fade-out');
                });
            }

            // Close modals if user clicks outside
            window.addEventListener('click', function(event) {
                const modal = document.querySelector('.modal');
                if (event.target === modal) {
                    modal.classList.remove('fade-in');
                    modal.classList.add('fade-out');
                    setTimeout(() => {
                        modal.style.display = 'none';
                        modal.classList.remove('fade-out');
                    }, 300);
                }
            });
        });
    </script>

    <style>
        /* Add consistent modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4); /* Dark background */
        }

        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 80%;
            max-width: 400px;
            transition: all 0.3s ease-in-out;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close, .close-modal {
            cursor: pointer;
            font-size: 20px;
        }

        .modal-body {
            padding: 10px 0;
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .fade-out {
            opacity: 1;
            animation: fadeOut 0.3s forwards;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
            }
        }
    </style>

</body>
</html>
