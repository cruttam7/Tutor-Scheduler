<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        /* General styling for body and form container */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #a8e063, #56ab2f);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .reset-password-container {
            width: 100%;
            max-width: 400px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            margin: 20px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #333;
        }

        /* Styling for input fields */
        input[type="password"] {
            width: calc(100% - 20px);
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus {
            border-color: #56ab2f;
            box-shadow: 0 0 5px rgba(86, 171, 47, 0.3);
        }

        /* Styling for buttons */
        button {
            width: 100%;
            padding: 12px;
            background-color: #56ab2f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #4c9928;
        }

        .password-container {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888;
        }

        .toggle-password:hover {
            color: #333;
        }

        /* Feedback message styling */
        #resetMessage,
        #passwordFeedback {
            margin-top: 10px;
            font-size: 14px;
            text-align: left;
            color: red;
        }

        /* Mobile-friendly adjustments */
        @media (max-width: 768px) {
            .reset-password-container {
                padding: 20px;
                margin: 15px;
            }
        }

    </style>
    <!-- Font Awesome for Eye Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="reset-password-container">
        <div class="form-box">
            <h1>Reset Your Password</h1>
            <form id="resetPasswordForm">
                <!-- New Password Field -->
                <div class="password-container">
                    <input type="password" id="newPassword" placeholder="New Password" required>
                    <i class="fas fa-eye toggle-password" id="toggleNewPassword"></i>
                </div>
                <p id="passwordFeedback"></p> <!-- Live password feedback -->

                <!-- Confirm Password Field -->
                <div class="password-container">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                    <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
                </div>
                
                <!-- Reset Button -->
                <button type="submit">Reset Password</button>
            </form>
            <div id="resetMessage"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const resetPasswordForm = document.getElementById('resetPasswordForm');
            const newPassword = document.getElementById('newPassword');
            const confirmPassword = document.getElementById('confirmPassword');
            const resetMessage = document.getElementById('resetMessage');
            const passwordFeedback = document.getElementById('passwordFeedback');
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            // Password requirements regex
            const passwordRegex = /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$/;

            // Function to validate password strength
            const validatePassword = () => {
                const password = newPassword.value;
                if (passwordRegex.test(password)) {
                    passwordFeedback.textContent = "Password is strong.";
                    passwordFeedback.style.color = "green";
                } else {
                    passwordFeedback.textContent = "Password must be at least 8 characters long, include uppercase, lowercase, a number, and a special character.";
                    passwordFeedback.style.color = "red";
                }
            };

            // Live password validation
            newPassword.addEventListener('input', validatePassword);

            // Toggle password visibility for both password fields
            document.getElementById('toggleNewPassword').addEventListener('click', function () {
                const type = newPassword.getAttribute('type') === 'password' ? 'text' : 'password';
                newPassword.setAttribute('type', type);
                this.classList.toggle('fa-eye-slash');
            });

            document.getElementById('toggleConfirmPassword').addEventListener('click', function () {
                const type = confirmPassword.getAttribute('type') === 'password' ? 'text' : 'password';
                confirmPassword.setAttribute('type', type);
                this.classList.toggle('fa-eye-slash');
            });

            // Password reset form submission
            resetPasswordForm.addEventListener('submit', async function(event) {
                event.preventDefault();
                const newPasswordValue = newPassword.value;
                const confirmPasswordValue = confirmPassword.value;

                // Ensure the passwords match
                if (newPasswordValue !== confirmPasswordValue) {
                    resetMessage.textContent = "Passwords do not match.";
                    resetMessage.style.color = "red";
                    return;
                }

                // Ensure the password meets the strength requirements
                if (!passwordRegex.test(newPasswordValue)) {
                    resetMessage.textContent = "Password does not meet the required criteria.";
                    resetMessage.style.color = "red";
                    return;
                }

                // Make sure token is present in the URL
                if (!token) {
                    resetMessage.textContent = 'Invalid or missing token.';
                    resetMessage.style.color = "red";
                    return;
                }

                try {
                    const response = await fetch(`/tutors/reset-password-with-token/${token}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ newPassword: newPasswordValue })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        resetMessage.textContent = result.message || 'Password has been reset successfully.';
                        resetMessage.style.color = "green";
                        setTimeout(() => {
                            window.location.href = '/login.html'; // Redirect to login after 2 seconds
                        }, 2000);
                    } else {
                        resetMessage.textContent = result.message || 'Error resetting password. Please try again.';
                        resetMessage.style.color = "red";
                    }
                } catch (error) {
                    resetMessage.textContent = 'Error resetting password. Please try again later.';
                    resetMessage.style.color = "red";
                }
            });
        });
    </script>
</body>
</html>
