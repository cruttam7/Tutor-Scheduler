<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
   
    <title>Kid's Learning Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
          
        }

        body {
            font-family: 'Comic Sans MS', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
        }

        /* Navigation Bar */
        .navbar {
            background-color: #023047;
            padding: 15px;
            color: white;
            text-align: center;
height: 80px;        }

        .navbar ul {
            list-style: none;
            display: flex;
            justify-content: space-around;
        }

        .navbar ul li {
            display: inline;
            font-size: 18px;
        }

        .navbar ul li a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            transition: background-color 0.3s;
        }

        .navbar ul li a:hover {
            background-color: #ffb703;
            border-radius: 5px;
        }
        .sidebar {
      width: 250px;
      height: 100vh;
      position: fixed;
      top: 0;
      left:0;
      padding: 20px;
      left: -250px; /* Initially hidden */
      background-color: #333;
      color: white;
      
      transition: left 0.3s ease; /* Smooth transition for open/close */
      z-index: 1000;
     
      display: flex;
    flex-direction: column;
    justify-content: space-between;
    }
    

    .sidebar.active {
      left: 0; /* Moves into view when active */
    }

  

    .sidebar a:hover {
      background-color: #575757;
    }

      
        .sidebar a {
    color: white; /* Change text color to white */
  /* Add smooth hover effect */
}


        /* Close Button Styling */
        .close-btn {
            background-color: transparent;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        /* Open Sidebar Button Styling */
        .open-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #34495e;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
            z-index: 1000;
            transition: background-color 0.3s ease;
        }

        .open-btn:hover {
            background-color: #2c3e50;
        }

        /* Logout Button in Sidebar */
        .logout-btn {
            background-color: #e74c3c;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s ease;
            text-align: center;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }

        /* Main content */
        .container {
            margin-left: 220px;
            text-align: center;
            padding: 20px;
        }

        header {
            background-color: #ffde59;
            padding: 20px;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 36px;
            color: #2b2d42;
        }

        header p {
            font-size: 18px;
            color: #ef233c;
        }

        .subjects {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .subject-card {
            background-color: #8ecae6;
            padding: 20px;
            border-radius: 10px;
            width: 150px;
            text-align: center;
            transition: transform 0.3s;
        }

        .subject-card img {
            width: 100px;
            height: 100px;
        }

        .subject-card h2 {
            font-size: 24px;
            margin: 10px 0;
            color: #023047;
        }

        .subject-card button {
            background-color: #ffb703;
            border: none;
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .subject-card button:hover {
            background-color: #fb8500;
        }

        .subject-card:hover {
            transform: scale(1.1);
        }

        .activities {
            background-color: #edf6f9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .activities h2 {
            font-size: 28px;
            color: #219ebc;
        }

        #activity-content p {
            font-size: 18px;
            color: #023047;
        }

        /* Homework submission, Email, and Results */
        .actions {
            margin: 20px 0;
            text-align: left;
            display: flex;
            justify-content: space-around;
        }

        .action-box {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 20px;
            width: 30%;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .action-box h3 {
            font-size: 22px;
            color: #023047;
            margin-bottom: 10px;
        }

        .action-box form {
            display: flex;
            flex-direction: column;
        }

        .action-box input,
        .action-box textarea {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .action-box button {
            background-color: #ffb703;
            padding: 10px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .action-box button:hover {
            background-color: #fb8500;
        }

        @media (max-width: 768px) {
    .sidebar {
        left: -250px; /* Initially hidden */
    }
    .sidebar.active {
        left: 0; /* Shown when active */
    }
}

    </style>
</head>

        <section class="activities" id="activities">
            <h2>Activities</h2>
            <div id="activity-content">
                <p>Select a subject to see the activities!</p>
            </div>
        </section>


          <!-- Homework Submission, Email System, and Results -->
          <section class="actions">
            <!-- Ask Teacher Section -->
            <div class="action-box">
                <h3>Ask the Teacher</h3>
                <form id="ask-form">
                    <input type="text" id="ask-teacher-name" placeholder="Your Name" required>
                    <textarea id="ask-question" rows="4" placeholder="Ask a question..." required></textarea>
                    <button type="button" onclick="askTeacher()">Submit Question</button>
                </form>
            </div>

            <!-- Submit Homework Section -->
            <div class="action-box">
                <h3>Submit Homework</h3>
                <form id="homework-form">
                    <input type="text" id="student-name" placeholder="Your Name" required>
                    <input type="file" id="homework-file" required>
                    <button type="button" onclick="submitHomework()">Submit Homework</button>
                </form>
            </div>

            <!-- Email Section -->
            <div class="action-box">
                <h3>Email Your Teacher</h3>
                <form id="email-form">
                    <input type="email" id="email-address" placeholder="Teacher's Email" required>
                    <textarea id="email-message" rows="4" placeholder="Write your message..." required></textarea>
                    <button type="button" onclick="sendEmail()">Send Email</button>
                </form>
            </div>
        </section>
    </div>
    </div>

    <script>
        function askTeacher() {
            const name = document.getElementById('ask-teacher-name').value;
            const question = document.getElementById('ask-question').value;
            alert(`${name}, your question has been submitted to the teacher: "${question}"`);
            document.getElementById('ask-form').reset();
        }

        function submitHomework() {
            const name = document.getElementById('student-name').value;
            const file = document.getElementById('homework-file').files[0];
            if (file) {
                alert(`${name}, your homework (${file.name}) has been submitted successfully!`);
            } else {
                alert('Please attach a homework file.');
            }
            document.getElementById('homework-form').reset();
        }

        function sendEmail() {
            const email = document.getElementById('email-address').value;
            const message = document.getElementById('email-message').value;
            alert(`Your email to ${email} has been sent: "${message}"`);
            document.getElementById('email-form').reset();
        }

        function showScience() {
            document.getElementById('activity-content').innerHTML = `
                <h3>Science Activities:</h3>
                <ul>
                    <li>Explore the Solar System</li>
                    <li>Match Animals to Their Habitats</li>
                    <li>Plant Growth Experiment</li>
                </ul>
            `;
        }

        function showMath() {
            document.getElementById('activity-content').innerHTML = `
                <h3>Math Activities:</h3>
                <ul>
                    <li>Counting with Animals</li>
                    <li>Simple Addition and Subtraction</li>
                    <li>Shape Matching Game</li>
                </ul>
            `;
        }

        function showEnglish() {
            document.getElementById('activity-content').innerHTML = `
                <h3>English Activities:</h3>
                <ul>
                    <li>Spelling Bee Game</li>
                    <li>Simple Sentence Creation</li>
                    <li>Story Time - Create Your Own Story</li>
                </ul>
            `;
        }

        function login() {
            alert("You have logged in!");
        }

        function logout() {
            alert("You have logged out!");
        }
          // Function to hide button on scroll
     window.addEventListener('scroll', function() {
            var openBtn = document.getElementById('openBtn');

            if (window.scrollY > 0) {
                openBtn.style.display = 'none';
            } else {
                openBtn.style.display = 'block';
            }
        });


    // Function to toggle the sidebar
function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const mainContent = document.getElementById('mainContent');
      const openBtn = document.getElementById('openBtn');

      // Toggle sidebar active state
      sidebar.classList.toggle('active');
      mainContent.classList.toggle('shrink');

      // Show or hide the open button depending on the sidebar's state
      if (sidebar.classList.contains('active')) {
        openBtn.style.display = 'none';  // Hide open button when sidebar is active
      } else {
        openBtn.style.display = 'block'; // Show open button when sidebar is inactive
      }
    }

    // Add event listeners for open and close buttons
    document.getElementById('openBtn').addEventListener('click', toggleSidebar);
    document.getElementById('closeBtn').addEventListener('click', toggleSidebar);
 
    </script>
