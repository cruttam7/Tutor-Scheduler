<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Styling */
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #43b46e, #88d3ce);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container for the Form */
        .password-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            width: 40%;
        }

        /* Form Box */
        .form-box {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px; /* Prevent the form from being too wide */
            width: 70%;
        }

        /* Form Heading */
        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px; /* Adjusted for a better look */
        }

        /* Input Fields Styling */
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Input Focus State */
        input[type="password"]:focus {
            border-color: #43b46e;
            box-shadow: 0 0 5px rgba(67, 180, 110, 0.5);
        }

        /* Button Styling */
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #386331;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            margin-top: 20px;
        }

        /* Button Hover and Focus */
        button[type="submit"]:hover,
        button[type="submit"]:focus {
            background-color: #88d3ce;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Error Message Styling (Optional) */
        .error-message {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="form-box">
            <h2>Change Your Password</h2>
            <form id="resetPasswordForm">
                <label for="currentPassword">Current Password:</label>
                <input type="password" id="currentPassword" name="currentPassword" required><br>

                <label for="newPassword">New Password:</label>
                <input type="password" id="newPassword" name="newPassword" required><br>

                <button type="submit">Submit</button>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alert('Error: Tutor token not found in the URL.');
        } else {
            console.log('Tutor Token:', token);
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            if (!token) {
                alert('Unable to proceed: Token is missing.');
                return;
            }

            const response = await fetch(`/tutors/change-password/${token}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ currentPassword, newPassword })
            });

            const result = await response.json();
            if (response.ok) {
                alert('Password changed successfully!');
            } else {
                alert(result.message);
            }
        });
    </script>
</body>
</html>
