<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="dashboard-container">
        <h1>Welcome to your dashboard!</h1>
        <p>This is where you can view your information.</p>
        <button class="primary-button" onclick="window.location.href='profile.html'">Edit Profile</button>
        <a href="#" class="logout-link" onclick="logout(); return false;">Logout</a>
        
        <div class="create-account-section">
            <h2>Create Student Account</h2>
            <form id="createStudentForm">
                <label for="studentEmail">Student Email</label>
                <input type="email" id="studentEmail" placeholder="Enter student email" required>
                
                <label for="studentPassword">Student Password</label>
                <input type="password" id="studentPassword" placeholder="Enter student password" required>
                
                <button class="primary-button" type="submit">Create Student Account</button>
            </form>
        </div>

        <p>Need to create an account for a teacher? <a href="register.html" class="secondary-link">Register account here for teacher</a></p>
    </div>

    <script src="app.js"></script>
</body>
</html>
