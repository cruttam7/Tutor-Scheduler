<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teacher Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7fa;
      margin: 0;
      padding: 40px;
      color: #333;
    }

    .dashboard-container {
      max-width: 650px;
      margin: auto;
      background: #ffffff;
      padding: 35px 40px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    }

    h1, h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
      transition: border-color 0.3s ease;
    }

    textarea {
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #3498db;
      outline: none;
    }

    .checkbox-group {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
    }

    .checkbox-item input {
      margin-right: 8px;
    }

    .primary-button {
      width: 100%;
      padding: 12px;
      background-color: #3498db;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-top: 15px;
    }

    .primary-button:hover {
      background-color: #2980b9;
    }

    #registration-result, #event-result {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }

    .preview-box {
      background-color: #ecf6fc;
      padding: 15px;
      border-left: 4px solid #3498db;
      border-radius: 6px;
      margin-top: 20px;
      display: none;
    }

    .preview-box h3 {
      margin-top: 0;
    }

    .preview-box p {
      margin: 4px 0;
    }

    hr {
      margin: 40px 0;
      border: none;
      border-top: 2px dashed #ccc;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <h1>Teacher Dashboard</h1>

    <!-- Student Registration -->
    <h2>👨‍🎓 Create Student Account</h2>
    <form id="createStudentForm">
      <div class="form-group">
        <label for="studentName">Student Full Name</label>
        <input type="text" id="studentName" required />
      </div>

      <div class="form-group">
        <label for="studentDOB">Date of Birth</label>
        <input type="date" id="studentDOB" required />
      </div>

      <div class="form-group">
        <label for="studentGrade">Grade</label>
        <select id="studentGrade" required>
          <option value="">Select Grade</option>
          <option value="Grade 1">1st Grade</option>
          <option value="Grade 2">2nd Grade</option>
          <option value="Grade 3">3rd Grade</option>
          <option value="Grade 4">4th Grade</option>
          <option value="Grade 5">5th Grade</option>
        </select>
      </div>

      <div class="form-group">
        <label>Select Courses</label>
        <div class="checkbox-group">
          <div class="checkbox-item"><input type="checkbox" value="Mathematics" class="course"> <label>Mathematics</label></div>
          <div class="checkbox-item"><input type="checkbox" value="English" class="course"> <label>English</label></div>
          <div class="checkbox-item"><input type="checkbox" value="Science" class="course"> <label>Science</label></div>
        </div>
      </div>

      <div class="form-group">
        <label for="guardianName">Guardian Name</label>
        <input type="text" id="guardianName" required />
      </div>

      <div class="form-group">
        <label for="username">Student Username</label>
        <input type="text" id="username" required />
      </div>

      <div class="form-group">
        <label for="studentEmail">Student Email</label>
        <input type="email" id="studentEmail" required />
      </div>
      <div class="form-group">
        <label for="guardianEmail">Guardian Email</label>
        <input type="email" id="guardianEmail" required />
      </div>
      
      <div class="form-group">
        <label for="guardianPhone">Guardian Phone</label>
        <input type="tel" id="guardianPhone" required />
      </div>
      
      <div class="form-group">
        <label for="relationship">Relationship</label>
        <select id="relationship" required>
          <option value="">Select</option>
          <option value="Mother">Mother</option>
          <option value="Father">Father</option>
          <option value="Guardian">Guardian</option>
        </select>
      </div>
      
     

      <button class="primary-button" type="submit">Register Student</button>
    </form>

    <div id="preview" class="preview-box">
      <h3>Student Registration Preview</h3>
      <p><strong>Name:</strong> <span id="preview-name"></span></p>
      <p><strong>Grade:</strong> <span id="preview-grade"></span></p>
      <p><strong>Courses:</strong> <span id="preview-courses"></span></p>
      <p><strong>Guardian:</strong> <span id="preview-guardian"></span></p>
    </div>

    <div id="registration-result"></div>

    <hr>

    <!-- Class Event Form -->
    <h2>📅 Schedule a Class</h2>
    <form id="eventForm">
      <div class="form-group">
        <label for="title">Class Title</label>
        <input type="text" name="title" required />
      </div>

      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" name="date" required />
      </div>

      <div class="form-group">
        <label for="time">Time</label>
        <input type="time" name="time" required />
      </div>

      <div class="form-group">
        <label for="location">Location (e.g. Room 2B)</label>
        <input type="text" name="location" required />
      </div>

      <div class="form-group">
        <label for="description">Notes</label>
        <textarea name="description" rows="3" placeholder="e.g. Bring notebooks and pencils"></textarea>
      </div>

      <div class="form-group">
        <label for="itemsToBring">Items to Bring (comma separated)</label>
        <input type="text" name="itemsToBring" placeholder="e.g. Pencil, Math Book" />
      </div>

      <div class="form-group">
        <label for="classType">Class Type</label>
        <select name="classType">
          <option value="Other">Choose Subject</option>
          <option value="Math">Math</option>
          <option value="Art">Art</option>
          <option value="Science">Science</option>
          <option value="PE">PE</option>
        </select>
      </div>

      <input type="hidden" name="createdBy" value="1234567890" />
      <button class="primary-button" type="submit">Add Event</button>
    </form>

    <div id="event-result"></div>
  </div>

  <script>
    // Student registration handler
    document.getElementById("createStudentForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const selectedCourses = Array.from(document.querySelectorAll(".course:checked")).map(c => c.value);
      if (selectedCourses.length === 0) {
        alert("Please select at least one course.");
        return;
      }

      const studentData = {
        studentName: document.getElementById("studentName").value,
        studentDOB: document.getElementById("studentDOB").value,
        studentGrade: document.getElementById("studentGrade").value,
        courses: selectedCourses,
        guardianName: document.getElementById("guardianName").value,
        username: document.getElementById("username").value,
        email: document.getElementById("studentEmail").value,
        studentSchool: "Not Provided",
        guardianEmail: document.getElementById("guardianEmail").value,
guardianPhone: document.getElementById("guardianPhone").value,
relationship: document.getElementById("relationship").value,

      };

      // Show preview
      document.getElementById("preview-name").textContent = studentData.studentName;
      document.getElementById("preview-grade").textContent = studentData.studentGrade;
      document.getElementById("preview-courses").textContent = selectedCourses.join(", ");
      document.getElementById("preview-guardian").textContent = studentData.guardianName;
      document.getElementById("preview").style.display = "block";

      const confirmSubmit = confirm("Do you want to submit this registration?");
      if (!confirmSubmit) return;

      try {
        const response = await fetch("/tutors/create-student", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(studentData),
        });

        const result = await response.json();
        const resultBox = document.getElementById("registration-result");

        if (response.ok) {
          resultBox.style.color = "green";
          resultBox.textContent = "Student registered successfully!";
          e.target.reset();
          document.getElementById("preview").style.display = "none";
        } else {
          resultBox.style.color = "red";
          resultBox.textContent = result.message || "Registration failed.";
        }
      } catch (err) {
        console.error("Registration error:", err);
        document.getElementById("registration-result").textContent = "Something went wrong.";
      }
    });

    // Class event submission handler
    document.getElementById("eventForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const form = e.target;
      const data = {
        title: form.title.value,
        date: form.date.value,
        time: form.time.value,
        location: form.location.value,
        description: form.description.value,
        itemsToBring: form.itemsToBring.value.split(',').map(i => i.trim()),
        classType: form.classType.value,
        createdBy: form.createdBy.value
      };

      const res = await fetch('/api/events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await res.json();
      const resultBox = document.getElementById("event-result");

      if (res.ok) {
        resultBox.style.color = "green";
        resultBox.textContent = "Class event added successfully!";
        form.reset();
      } else {
        resultBox.style.color = "red";
        resultBox.textContent = result.message || "Failed to create event.";
      }
    });
  </script>
</body>
</html>
