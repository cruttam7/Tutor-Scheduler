<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutor Registration</title>
    <link rel="stylesheet" href="/register.css">
</head>
<body>
    <h1>Register a New Tutor</h1>

    <form id="tutorRegistrationForm">
        <!-- Personal Information -->
        <h2>Personal Information</h2>
        <label for="firstName">First Name:</label>
        <input type="text" id="firstName" name="firstName" required><br>

        <label for="lastName">Last Name:</label>
        <input type="text" id="lastName" name="lastName" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" required><br>

        <label for="address">Address (City, State, Country):</label>
        <input type="text" id="address" name="address" required><br>

        <!-- Professional Information -->
        <h2>Professional Information</h2>
        <label for="subjects">Subjects (Comma separated):</label>
        <input type="text" id="subjects" name="subjects" required><br>

        <label for="qualifications">Educational Qualifications:</label>
        <textarea id="qualifications" name="qualifications" required></textarea><br>

        <label for="experience">Teaching Experience (in years):</label>
        <input type="number" id="experience" name="experience" required><br>

        <label for="bio">Brief Bio/Introduction:</label>
        <textarea id="bio" name="bio" required></textarea><br>

        <label for="rate">Hourly Rate (in USD):</label>
        <input type="number" id="rate" name="rate" required><br>

        <!-- Account Information -->
        <h2>Account Information</h2>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br>

        <button type="submit">Register Tutor</button>
    </form>

    <div id="message"></div>

    <script>
        // Handle form submission
        document.getElementById('tutorRegistrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                subjects: document.getElementById('subjects').value,
                qualifications: document.getElementById('qualifications').value,
                experience: document.getElementById('experience').value,
                bio: document.getElementById('bio').value,
                rate: document.getElementById('rate').value,
                username: document.getElementById('username').value
            };

            // Send a POST request to register the tutor
            const response = await fetch('/admin/register-tutor', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            const result = await response.json();
            document.getElementById('message').textContent = result.message;

            if (response.ok) {
                document.getElementById('tutorRegistrationForm').reset();
            }
        });
    </script>
</body>
</html>
