<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Users</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 30px;
    }
    h1 {
      text-align: center;
      margin-bottom: 10px;
    }
    .tabs, .filters, .search-bar {
      text-align: center;
      margin: 10px;
    }
    .tabs button, .filters select {
      padding: 10px 16px;
      font-size: 15px;
      border: none;
      border-radius: 5px;
      background: #3498db;
      color: white;
      cursor: pointer;
      margin: 5px;
    }
    .tabs button:hover {
      background: #2980b9;
    }
    .search-bar input {
      padding: 10px;
      width: 250px;
      font-size: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    table {
      width: 100%;
      max-width: 1100px;
      margin: 20px auto;
      border-collapse: collapse;
      background: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    thead {
      background: #3498db;
      color: white;
    }
    .action-btn {
      padding: 6px 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: white;
      margin-right: 5px;
    }
    .edit-btn { background: #2ecc71; }
    .delete-btn { background: #e74c3c; }
    .pagination {
      text-align: center;
      margin-top: 10px;
    }
    .pagination button {
      margin: 0 5px;
      padding: 8px 14px;
      border: none;
      background: #2980b9;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      padding: 25px;
      border-radius: 10px;
      width: 90%;
      max-width: 500px;
    }
    .modal-content h2 {
      margin-bottom: 15px;
      font-size: 22px;
    }
    .modal-content label {
      display: block;
      margin: 10px 0 4px;
    }
    .modal-content input, .modal-content textarea {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .modal-content button {
      padding: 10px 20px;
      background: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      margin-top: 10px;
      cursor: pointer;
    }
    .modal-content .cancel-btn {
      background: #e74c3c;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <h1>Manage Users</h1>

  <div class="tabs">
    <button onclick="switchTab('students')">Manage Students</button>
    <button onclick="switchTab('tutors')">Manage Tutors</button>
    <button onclick="exportCSV()">Export to CSV</button>
  </div>
<div id="notification" style="display: none; text-align:center; margin: 15px auto; width: fit-content; padding: 10px 20px; border-radius: 6px; font-size: 16px;"></div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search by name..." oninput="applySearch()" />
  </div>

  <div class="filters">
    <select id="filterSelect" onchange="applyFilter()">
      <option value="">Filter by</option>
    </select>
  </div>

  <table>
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="pagination">
    <button onclick="prevPage()">Previous</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">Next</button>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <h2>Edit User</h2>
      <form id="editForm">
        <input type="hidden" id="editId" />
        <label for="editName">Name</label>
        <input type="text" id="editName" required />

        <label for="editEmail">Email</label>
        <input type="email" id="editEmail" required />

        <div id="extraFields"></div>

        <button type="submit">Save</button>
        <button type="button" class="cancel-btn" onclick="closeModal()">Cancel</button>
      </form>
    </div>
  </div>
<script>
  let currentTab = 'students';
  let allData = [];
  let filteredData = [];
  let page = 1;
  const limit = 5;

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('searchInput').value = '';
    document.getElementById('filterSelect').innerHTML = '<option value="">Filter by</option>';
    page = 1;
    fetchData();
  }

  async function fetchData() {
    const res = await fetch(`/admin/manage-users/${currentTab}`);
    allData = await res.json();
    filteredData = [...allData];
    renderTable();
    populateFilterOptions();
  }

  function renderTable() {
    const head = document.getElementById('tableHead');
    const body = document.getElementById('tableBody');
    const paged = filteredData.slice((page - 1) * limit, page * limit);
    document.getElementById('pageInfo').innerText = `Page ${page} of ${Math.ceil(filteredData.length / limit)}`;

    head.innerHTML = '';
    body.innerHTML = '';

    if (currentTab === 'tutors') {
      head.innerHTML = `<tr><th>Name</th><th>Email</th><th>Phone</th><th>Address</th><th>Subjects</th><th>Rate</th><th>Actions</th></tr>`;
      paged.forEach(t => {
        const subjects = Array.isArray(t.subjects) ? t.subjects.join(', ') : '-';
        body.innerHTML += `
          <tr>
            <td>${t.firstName} ${t.lastName}</td>
            <td>${t.email}</td>
            <td>${t.phone || '-'}</td>
            <td>${t.address || '-'}</td>
            <td>${subjects}</td>
            <td>${t.rate || '-'}</td>
            <td>
              <button class="action-btn edit-btn" onclick='editUser(${JSON.stringify(t).replace(/"/g, '&quot;')})'>Edit</button>
              <button class="action-btn delete-btn" onclick="deleteUser('${t._id}', 'tutor')">Delete</button>
            </td>
          </tr>`;
      });
    } else {
      head.innerHTML = `<tr><th>Name</th><th>Email</th><th>Grade</th><th>Guardian</th><th>Actions</th></tr>`;
      paged.forEach(s => {
        body.innerHTML += `
          <tr>
            <td>${s.studentName}</td>
            <td>${s.email}</td>
            <td>${s.studentGrade || '-'}</td>
            <td>${s.guardianName || '-'}</td>
            <td>
              <button class="action-btn edit-btn" onclick='editUser(${JSON.stringify(s).replace(/"/g, '&quot;')})'>Edit</button>
              <button class="action-btn delete-btn" onclick="deleteUser('${s._id}', 'student')">Delete</button>
            </td>
          </tr>`;
      });
    }
  }

  function nextPage() {
    if (page * limit < filteredData.length) {
      page++;
      renderTable();
    }
  }

  function prevPage() {
    if (page > 1) {
      page--;
      renderTable();
    }
  }

  function editUser(user) {
    document.getElementById('editModal').style.display = 'flex';
    document.getElementById('editId').value = user._id;
    document.getElementById('editEmail').value = user.email;
    document.getElementById('editName').value = currentTab === 'tutors'
      ? `${user.firstName} ${user.lastName}` : user.studentName;

    const extraFields = document.getElementById('extraFields');
    extraFields.innerHTML = '';

    if (currentTab === 'tutors') {
      extraFields.innerHTML = `
        <label>Phone</label><input id="editPhone" value="${user.phone || ''}" />
        <label>Address</label><input id="editAddress" value="${user.address || ''}" />
        <label>Subjects (comma separated)</label><input id="editSubjects" value="${Array.isArray(user.subjects) ? user.subjects.join(', ') : ''}" />
        <label>Rate</label><input id="editRate" type="number" value="${user.rate || ''}" />
      `;
    } else {
      extraFields.innerHTML = `
        <label>Grade</label><input id="editGrade" value="${user.studentGrade || ''}" />
        <label>Guardian Name</label><input id="editGuardianName" value="${user.guardianName || ''}" />
      `;
    }
  }

  function closeModal() {
    document.getElementById('editModal').style.display = 'none';
  }

  document.getElementById('editForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = document.getElementById('editId').value;
    const email = document.getElementById('editEmail').value;
    const name = document.getElementById('editName').value.trim();

    let updateData = { email };

    if (currentTab === 'tutors') {
      const [firstName, ...last] = name.split(' ');
      updateData = {
        ...updateData,
        firstName,
        lastName: last.join(' ') || '',
        phone: document.getElementById('editPhone').value,
        address: document.getElementById('editAddress').value,
        subjects: document.getElementById('editSubjects').value.split(',').map(s => s.trim()),
        rate: parseFloat(document.getElementById('editRate').value)
      };
    } else {
      updateData = {
        ...updateData,
        studentName: name,
        studentGrade: document.getElementById('editGrade').value,
        guardianName: document.getElementById('editGuardianName').value
      };
    }

    const res = await fetch(`/admin/manage-users/${currentTab}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updateData)
    });
    const result = await res.json();
    showNotification(result.message, 'success');
    closeModal();
    fetchData();
  });

  async function deleteUser(id, type) {
  if (!confirm('Are you sure you want to delete this user?')) return;
  const pluralType = type === 'tutor' ? 'tutors' : 'students'; // 🔥 FIX HERE
  const res = await fetch(`/admin/manage-users/${pluralType}/${id}`, { method: 'DELETE' });
  const msg = await res.json();
 showNotification(msg.message, 'success');
  fetchData();
}


  function applySearch() {
    const keyword = document.getElementById('searchInput').value.toLowerCase();
    filteredData = allData.filter(d =>
      currentTab === 'tutors'
        ? `${d.firstName} ${d.lastName}`.toLowerCase().includes(keyword)
        : d.studentName.toLowerCase().includes(keyword)
    );
    page = 1;
    renderTable();
  }

  function populateFilterOptions() {
    const select = document.getElementById('filterSelect');
    let values = new Set();
    allData.forEach(d => {
      if (currentTab === 'tutors' && Array.isArray(d.subjects)) {
        d.subjects.forEach(s => values.add(s));
      }
      if (currentTab === 'students' && d.studentGrade) {
        values.add(d.studentGrade);
      }
    });
    select.innerHTML = `<option value="">Filter by</option>`;
    for (let val of values) {
      select.innerHTML += `<option value="${val}">${val}</option>`;
    }
  }

  function applyFilter() {
    const value = document.getElementById('filterSelect').value;
    if (!value) return filteredData = [...allData], renderTable();
    filteredData = allData.filter(d =>
      currentTab === 'tutors' ? d.subjects?.includes(value) : d.studentGrade === value
    );
    page = 1;
    renderTable();
  }

  function exportCSV() {
    const rows = [Array.from(document.querySelectorAll('thead th')).map(th => `"${th.innerText}"`)];
    document.querySelectorAll('tbody tr').forEach(row => {
      const cells = Array.from(row.querySelectorAll('td')).map(td => `"${td.innerText}"`);
      rows.push(cells);
    });
    const blob = new Blob([rows.map(r => r.join(',')).join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${currentTab}_export.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  switchTab('students');

  function showNotification(message, type = 'success') {
  const box = document.getElementById('notification');
  box.innerText = message;
  box.style.display = 'block';
  box.style.backgroundColor = type === 'success' ? '#2ecc71' : '#e74c3c';
  box.style.color = 'white';
  box.style.boxShadow = '0 4px 10px rgba(0,0,0,0.1)';

  setTimeout(() => {
    box.style.display = 'none';
  }, 3000);
}

</script>
</body>
</html>
