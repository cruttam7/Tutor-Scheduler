<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Admin Password</title>
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="reset-container">
        <h1>Reset Your Password</h1>

        <form id="resetPasswordForm">
            <label for="newPassword">New Password:</label>
            <input type="password" id="newPassword" name="newPassword" required><br>

            <label for="confirmPassword">Confirm New Password:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required><br>

            <button type="submit">Reset Password</button>
        </form>

        <div id="message"></div>
    </div>

    <script>
        // Get the reset token from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
    
        console.log(`Reset token: ${token}`);
    
        // Handle password reset form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
    
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
    
            console.log(`New password: ${newPassword}`);
    
            if (newPassword !== confirmPassword) {
                document.getElementById('message').textContent = 'Passwords do not match!';
                document.getElementById('message').style.color = 'red';
                return;
            }
    
            // Send the new password and token to the backend
            const response = await fetch(`/admin/reset-password/${token}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ newPassword })
            });
    
            const result = await response.json();
            document.getElementById('message').textContent = result.message;
    
            if (response.ok) {
                document.getElementById('message').textContent = 'Password reset successful!';
                document.getElementById('message').style.color = 'green';
    
                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = '/admin-login.html';
                }, 2000);
            } else {
                document.getElementById('message').textContent = 'Error resetting password.';
                document.getElementById('message').style.color = 'red';
            }
        });
    </script>
    
    
</body>
</html>
