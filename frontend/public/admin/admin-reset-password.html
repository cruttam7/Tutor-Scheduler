<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Admin Password</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #43b46e, #88d3ce);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #333;
    }

    .reset-container {
      background-color: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
      text-align: center;
      width: 100%;
      max-width: 450px;
      position: relative;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      font-size: 28px;
      font-weight: 600;
    }

    .input-wrapper {
      position: relative;
      margin: 12px 0;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px;
      padding-right: 44px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input[type="password"]:focus {
      border-color: #43b46e;
      box-shadow: 0 0 6px rgba(67, 180, 110, 0.5);
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: #888;
      cursor: pointer;
    }

    .toggle-password:hover {
      color: #2e7d32;
    }

    button[type="submit"] {
      width: 100%;
      padding: 14px;
      background-color: #386331;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
      margin-top: 20px;
    }

    button[type="submit"]:hover,
    button[type="submit"]:focus {
      background-color: #88d3ce;
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    #message {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="reset-container">
    <h1>Reset Your Password</h1>
    <form id="resetPasswordForm">
      <div class="input-wrapper">
        <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required>
        <i class="fas fa-eye toggle-password" id="toggleNewPassword" title="Show Password"></i>
      </div>

      <div class="input-wrapper">
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm New Password" required>
        <i class="fas fa-eye toggle-password" id="toggleConfirmPassword" title="Show Password"></i>
      </div>

      <button type="submit" id="resetBtn">Reset Password</button>
    </form>
    <div id="message"></div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const resetForm = document.getElementById('resetPasswordForm');
    const resetBtn = document.getElementById('resetBtn');
    const message = document.getElementById('message');

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      let newPassword = document.getElementById('newPassword').value.trim();
      let confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (newPassword !== confirmPassword) {
        message.textContent = '❌ Passwords do not match!';
        message.style.color = 'red';
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = "Resetting...";

      try {
        const response = await fetch(`/admin/reset-password/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ newPassword })
        });

        const result = await response.json();

        if (response.ok) {
          message.textContent = '✅ Password reset successful!';
          message.style.color = 'green';
          setTimeout(() => {
            window.location.href = '/admin-login.html';
          }, 2000);
        } else {
          message.textContent = result.message || '❌ Error resetting password.';
          message.style.color = 'red';
        }
      } catch (error) {
        console.error('Error:', error);
        message.textContent = '❌ Server error. Please try again.';
        message.style.color = 'red';
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = "Reset Password";
      }
    });

    // Eye toggle logic
    function setupToggle(toggleId, inputId) {
      const toggleIcon = document.getElementById(toggleId);
      const inputField = document.getElementById(inputId);

      toggleIcon.addEventListener('click', () => {
        const isPassword = inputField.type === 'password';
        inputField.type = isPassword ? 'text' : 'password';
        toggleIcon.classList.toggle('fa-eye');
        toggleIcon.classList.toggle('fa-eye-slash');
        toggleIcon.title = isPassword ? 'Hide Password' : 'Show Password';
      });
    }

    setupToggle('toggleNewPassword', 'newPassword');
    setupToggle('toggleConfirmPassword', 'confirmPassword');
  </script>
</body>
</html>
