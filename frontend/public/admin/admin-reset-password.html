<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Admin Password</title>
    <style> 
        
/* Global Reset */ 
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body Styling */
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #43b46e, #88d3ce);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
}

/* Container for the Reset Form */
.reset-container {
    background-color: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
    text-align: center;
    width: 100%;
    max-width: 450px;
}

/* Form Heading */
h1 {
    color: #333;
    margin-bottom: 30px;
    font-size: 28px;
    font-weight: 600;
}

/* Input Fields Styling */
input[type="password"] {
    width: 100%;
    padding: 14px;
    margin: 12px 0;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

/* Input Focus State */
input[type="password"]:focus {
    border-color: #43b46e;
    box-shadow: 0 0 6px rgba(67, 180, 110, 0.5);
}

/* Button Styling */
button[type="submit"] {
    width: 100%;
    padding: 14px;
    background-color: #386331;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    margin-top: 20px;
}

/* Button Hover and Focus */
button[type="submit"]:hover,
button[type="submit"]:focus {
    background-color: #88d3ce;
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

/* Message Styling */
#message {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    color: #333;
}


    </style>
</head>
<body>
    <div class="reset-container">
        <h1>Reset Your Password</h1>

        <form id="resetPasswordForm">
            <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required><br>

            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm New Password" required><br>

            <button type="submit">Reset Password</button>
        </form>
    </div>

    <script>
        // Get the reset token from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
    
        console.log(`Reset token: ${token}`);
    
        // Handle password reset form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
    
            let newPassword = document.getElementById('newPassword').value;
            let confirmPassword = document.getElementById('confirmPassword').value;

            // Trim white spaces from the password
            newPassword = newPassword.trim();
            confirmPassword = confirmPassword.trim();
    
            console.log(`New password: ${newPassword}`);
            console.log(`Confirm password: ${confirmPassword}`);
    
            // Validate if passwords match
            if (newPassword !== confirmPassword) {
                document.getElementById('message').textContent = 'Passwords do not match!';
                document.getElementById('message').style.color = 'red';
                return;
            }
    
            // Send only the new password and token to the backend
            const response = await fetch(`/admin/reset-password/${token}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ newPassword })  // Only sending newPassword
            });
    
            const result = await response.json();
            document.getElementById('message').textContent = result.message;
    
            if (response.ok) {
                document.getElementById('message').textContent = 'Password reset successful!';
                document.getElementById('message').style.color = 'green';
    
                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = '/admin-login.html';
                }, 2000);
            } else {
                document.getElementById('message').textContent = result.message || 'Error resetting password.';
                document.getElementById('message').style.color = 'red';
            }
        });
    </script>
    
</body>
</html>
