<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #43b46e, #88d3ce);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .password-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      width: 100%;
    }

    .form-box {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 400px;
      text-align: center;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 24px;
    }

    input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
      outline: none;
    }

    input[type="password"]:focus {
      border-color: #43b46e;
      box-shadow: 0 0 5px rgba(67, 180, 110, 0.5);
    }

    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: #386331;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      margin-top: 20px;
    }

    button[type="submit"]:hover {
      background-color: #88d3ce;
    }
  </style>
</head>
<body>
  <div class="password-container">
    <div class="form-box">
      <h2>Change Your Password</h2>
      <form id="resetPasswordForm">
        <input type="password" id="currentPassword" name="currentPassword" placeholder="Current Password" required autocomplete="current-password">
        <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required autocomplete="new-password">
        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      alert('Error: Token not found in the URL.');
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;

      try {
        const response = await fetch(`/students/change-password-student/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ currentPassword, newPassword })
        });

        const result = await response.json();
        if (response.ok) {
          alert('Password changed successfully!');
          window.location.href = '/students/login.html';
        } else {
          alert(result.message || 'Failed to update password.');
        }
      } catch (err) {
        alert('Something went wrong.');
      }
    });
  </script>
</body>
</html>
