<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password</title>

  <!-- ✅ Font Awesome for Eye Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #43b46e, #88d3ce);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .password-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .form-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 400px;
      text-align: center;
    }
    h2 {
      margin-bottom: 20px;
      font-size: 24px;
      color: #333;
    }
    .input-group {
      position: relative;
      margin-bottom: 15px;
    }
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
      padding-right: 40px;
    }
    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
    }
    .toggle-password i {
      font-size: 18px;
      color: #444;
    }
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background-color: #386331;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
      transition: background-color 0.3s ease;
    }
    button[type="submit"]:hover {
      background-color: #88d3ce;
    }
  </style>
</head>
<body>
  <div class="password-container">
    <div class="form-box">
      <h2>Change Your Password</h2>
      <form id="resetPasswordForm">
        <div class="input-group">
          <input type="password" id="currentPassword" placeholder="Current Password" required />
          <button type="button" class="toggle-password" onclick="togglePassword('currentPassword', this)">
            <i class="fa-solid fa-eye-slash"></i>
          </button>
        </div>

        <div class="input-group">
          <input type="password" id="newPassword" placeholder="New Password" required />
          <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">
            <i class="fa-solid fa-eye-slash"></i>
          </button>
        </div>

        <div class="input-group">
          <input type="password" id="confirmPassword" placeholder="Confirm New Password" required />
          <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">
            <i class="fa-solid fa-eye-slash"></i>
          </button>
        </div>

        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

  <script>
    // Toggle password visibility
    function togglePassword(fieldId, btn) {
      const input = document.getElementById(fieldId);
      const icon = btn.querySelector('i');
      const isVisible = input.type === 'text';
      input.type = isVisible ? 'password' : 'text';
      icon.classList.toggle('fa-eye', !isVisible);
      icon.classList.toggle('fa-eye-slash', isVisible);
    }

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      alert('❌ Error: Token missing in URL.');
    }

    // Form submission handler
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        alert('❌ New password and confirm password do not match.');
        return;
      }

      if (!token) {
        alert('❌ Invalid or missing token.');
        return;
      }

      try {
        const response = await fetch(`https://nlf83kc2-3000.aue.devtunnels.ms/tutors/change-password/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ currentPassword, newPassword })
        });

        const result = await response.json();
        if (response.ok) {
          alert('✅ Password changed successfully!');
          window.location.href = '/login.html'; // or '/home.html' if that’s your file
        } else {
          alert(result.message || '❌ Error changing password.');
        }
      } catch (err) {
        alert('❌ Network error. Please try again later.');
      }
    });
  </script>
</body>
</html>
