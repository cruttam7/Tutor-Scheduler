<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
</head>
<body>
  <h2>Change Your Password</h2>
  <form id="resetPasswordForm">
    <label for="currentPassword">Current Password:</label>
    <input type="password" id="currentPassword" name="currentPassword" required><br>

    <label for="newPassword">New Password:</label>
    <input type="password" id="newPassword" name="newPassword" required><br>

    <button type="submit">Submit</button>
  </form>

  <script>
    // Extract the token from the URL query string
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
  
    // Check if the token is correctly extracted
    if (!token) {
      alert('Error: Tutor token not found in the URL.');
    } else {
      console.log('Tutor Token:', token);  // Log to ensure the token is extracted
    }
  
    // Attach an event listener to the form submission
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
  
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
  
      // Check if token is null before submitting
      if (!token) {
        alert('Unable to proceed: Token is missing.');
        return;
      }
  
      // Send the request to change the password via POST
      const response = await fetch(`/tutors/change-password/${token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword, newPassword })
      });
  
      const result = await response.json();
      if (response.ok) {
        alert('Password changed successfully!');
      } else {
        alert(result.message);
      }
    });
  </script>
  
  
</body>
</html>
