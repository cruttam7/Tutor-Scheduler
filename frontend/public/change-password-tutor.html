<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <style>
    /* Global Reset */
   /* Global Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body Styling */
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #43b46e, #88d3ce); /* Match the gradient from the login screen */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container for the Form */
.password-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
    width: 100%; /* Full width to ensure centering */
}

/* Form Box */
.form-box {
    background-color: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    width: 400px; /* Consistent width */
    text-align: center;
}

/* Form Heading */
h2 {
    color: #333;
    margin-bottom: 20px;
    font-size: 24px;
}

/* Input Fields Styling */
input[type="password"] {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

/* Input Focus State */
input[type="password"]:focus {
    border-color: #43b46e;
    box-shadow: 0 0 5px rgba(67, 180, 110, 0.5);
}

/* Button Styling */
button[type="submit"] {
    width: 100%;
    padding: 12px;
    background-color: #386331; /* Similar to the login button */
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 18px;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    margin-top: 20px;
}

/* Button Hover and Focus */
button[type="submit"]:hover,
button[type="submit"]:focus {
    background-color: #88d3ce; /* Lighter shade on hover */
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

</style>
</head>
<body>

 
  <div class="password-container">
    <div class="form-box">
      <h2>Change Your Password</h2>
      <form id="resetPasswordForm">
        <input type="password" id="currentPassword" name="currentPassword" placeholder="Current Password" required><br>

        <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required><br>

        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

  <script>
    // Extract the token from the URL query string
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
  
    // Check if the token is correctly extracted
    if (!token) {
      alert('Error: Tutor token not found in the URL.');
    } else {
      console.log('Tutor Token:', token);  // Log to ensure the token is extracted
    }
  
    // Attach an event listener to the form submission
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
  
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
  
      // Check if token is null before submitting
      if (!token) {
        alert('Unable to proceed: Token is missing.');
        return;
      }
  
      // Send the request to change the password via POST
      const response = await fetch(`/tutors/change-password/${token}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentPassword, newPassword })
      });
  
      const result = await response.json();
      if (response.ok) {
        alert('Password changed successfully!');
      } else {
        alert(result.message);
      }
    });
  </script>
  
  
</body>
</html>
