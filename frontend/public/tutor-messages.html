<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tutor Messaging</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef1f5;
      margin: 0;
      padding: 0;
    }

    .messenger-container {
      max-width: 950px;
      margin: 50px auto;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #2e86de;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .selector {
      padding: 20px;
      border-bottom: 1px solid #ddd;
    }

    select {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .chat-thread {
      height: 400px;
      overflow-y: auto;
      padding: 20px;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 15px;
      max-width: 75%;
      word-wrap: break-word;
    }

    .sent {
      background: #d1e7dd;
      align-self: flex-end;
      border-bottom-right-radius: 0;
      text-align: right;
    }

    .received {
      background: #e2e3e5;
      align-self: flex-start;
      border-bottom-left-radius: 0;
      text-align: left;
    }

    .message small {
      font-size: 11px;
      color: #555;
      display: block;
      margin-top: 5px;
    }

    form {
      padding: 20px;
      border-top: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    form input, form textarea {
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    form button {
      padding: 10px;
      background: #2e86de;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    form button:hover {
      background: #1b4f72;
    }
  </style>
</head>
<body>

<div class="messenger-container">
  <div class="header">📨 Tutor Messaging</div>

  <div class="selector">
    <label for="userSelect"><strong>Send To:</strong></label>
    <select id="userSelect"><option value="">-- Select User --</option></select>
  </div>

  <div class="chat-thread" id="chatThread">Select a user to view messages...</div>

  <form id="messageForm" enctype="multipart/form-data">
    <input type="text" id="subject" placeholder="Subject" required />
    <textarea id="body" rows="3" placeholder="Write your message..." required></textarea>
    <input type="file" id="attachment" />
    <button type="submit">Send Message</button>
  </form>
</div>

<script>
  let senderEmail = "";
  const chatBox = document.getElementById('chatThread');
  const recipientDropdown = document.getElementById('userSelect');

  async function getTutorEmail() {
    try {
      const res = await fetch('/api/tutor/me');
      if (!res.ok) throw new Error("Not logged in");
      const data = await res.json();
      senderEmail = data.email;
    } catch (err) {
      alert("❌ You are not logged in as a tutor.");
      console.error(err);
    }
  }

  async function loadUsers() {
    try {
      const res = await fetch('/api/tutor/recipients'); // Only admins + students
      const users = await res.json();

      recipientDropdown.innerHTML = '<option value="">-- Select User --</option>';
      users.forEach(user => {
        const opt = document.createElement('option');
        opt.value = user.email;
        opt.textContent = `${user.role === 'Admin' ? '👨‍💼' : '👩‍🎓'} ${user.role} - ${user.name}`;
        recipientDropdown.appendChild(opt);
      });
    } catch (error) {
      console.error("❌ Error loading recipients:", error);
      recipientDropdown.innerHTML = '<option value="">⚠️ Could not load users</option>';
    }
  }

  async function loadThread(recipientEmail) {
    chatBox.innerHTML = '<i>Loading messages...</i>';
    try {
      const res = await fetch(`/api/messages/thread/${senderEmail}/${recipientEmail}`);
      const messages = await res.json();

      chatBox.innerHTML = '';
      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = 'message ' + (msg.senderEmail === senderEmail ? 'sent' : 'received');
        div.innerHTML = `
          <strong>${msg.subject}</strong><br>
          ${msg.body}
          ${msg.attachment ? `<br><a href="/uploads/${msg.attachment}" target="_blank">📎 Attachment</a>` : ''}
          <small>${new Date(msg.timestamp).toLocaleString()}</small>
        `;
        chatBox.appendChild(div);
      });

      chatBox.scrollTop = chatBox.scrollHeight;
    } catch (err) {
      chatBox.innerHTML = '<i>❌ Failed to load messages</i>';
      console.error('❌ Error loading thread:', err);
    }
  }

  recipientDropdown.addEventListener('change', (e) => {
    const email = e.target.value;
    if (email) loadThread(email);
  });

  document.getElementById('messageForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const recipientEmail = recipientDropdown.value;
    if (!recipientEmail) return alert('Please select a user.');

    const formData = new FormData();
    formData.append('senderEmail', senderEmail);
    formData.append('recipientEmail', recipientEmail);
    formData.append('subject', document.getElementById('subject').value);
    formData.append('body', document.getElementById('body').value);
    if (document.getElementById('attachment').files[0]) {
      formData.append('attachment', document.getElementById('attachment').files[0]);
    }

    const res = await fetch('/api/messages/send', {
      method: 'POST',
      body: formData
    });

    if (res.ok) {
      document.getElementById('messageForm').reset();
      loadThread(recipientEmail);
    } else {
      alert('❌ Failed to send message');
    }
  });

  // ✅ Init + auto-load selected user thread
  (async () => {
    await getTutorEmail();
    if (senderEmail) {
      await loadUsers();

      const selectedUserEmail = localStorage.getItem('selectedUserEmail');
      if (selectedUserEmail) {
        const waitForOption = setInterval(() => {
          const option = [...recipientDropdown.options].find(opt => opt.value === selectedUserEmail);
          if (option) {
            recipientDropdown.value = selectedUserEmail;
            loadThread(selectedUserEmail);
            localStorage.removeItem('selectedUserEmail');
            clearInterval(waitForOption);
          }
        }, 200);
      }
    }
  })();
</script>

</body>
</html>
