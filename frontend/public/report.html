<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tutor Session Report</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: #fff;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
    }

    h1, h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 20px;
    }

    .filter-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .filter-section input, .filter-section button {
      padding: 10px 15px;
      margin: 0 5px;
      font-size: 14px;
    }

    .filter-section button {
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: center;
      font-size: 15px;
    }

    th {
      background-color: #3498db;
      color: white;
    }

    .btn-download {
      margin-top: 30px;
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      background-color: #2ecc71;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-download:hover {
      background-color: #27ae60;
    }

    .summary-box {
      background-color: #ecf0f1;
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📋 Tutor Session Report</h1>

    <div class="filter-section">
      <label>From: <input type="date" id="fromDate"></label>
      <label>To: <input type="date" id="toDate"></label>
      <button onclick="generateReport()">Generate Report</button>
    </div>

    <div id="reportContent">
      <!-- Report will be injected here -->
    </div>

    <button class="btn-download" onclick="downloadPDF()">Download as PDF</button>
  </div>

  <script>
    async function generateReport() {
      const from = document.getElementById('fromDate').value;
      const to = document.getElementById('toDate').value;

      if (!from || !to) {
        alert('Please select both From and To dates.');
        return;
      }

      try {
        const res = await fetch(`/api/user/report?from=${from}&to=${to}`);
        const data = await res.json();

        const sessionCount = data.sessions.length;
        const loginCount = data.logins.length;
        const attendanceCount = data.attendance.length;

        let html = `
          <h2>📅 Report Period: ${from} to ${to}</h2>
          <div class="summary-box">
            <p><strong>Total Sessions:</strong> ${sessionCount}</p>
            <p><strong>Total Student Logins:</strong> ${loginCount}</p>
            <p><strong>Total Attendance Records:</strong> ${attendanceCount}</p>
          </div>

          <h2>📚 Session Details</h2>
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Session Created By</th>
                <th>Session ID</th>
              </tr>
            </thead>
            <tbody>
        `;

        data.sessions.forEach(session => {
          html += `
            <tr>
              <td>${new Date(session.createdAt).toLocaleDateString()}</td>
            <td>${session.userId && session.userId.name ? session.userId.name : 'Unknown User'}</td>

              <td>${session._id}</td>
            </tr>
          `;
        });

        html += `
            </tbody>
          </table>

          <h2>🎯 Student Attendance</h2>
          <table>
            <thead>
              <tr>
                <th>Week</th>
                <th>Student Name</th>
                <th>Course</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
        `;

        data.attendance.forEach(record => {
          record.records.forEach(r => {
            html += `
              <tr>
                <td>${record.week}</td>
                <td>${r.studentName}</td>
                <td>${r.course}</td>
                <td>${r.status}</td>
              </tr>
            `;
          });
        });

        html += `
            </tbody>
          </table>
        `;

        document.getElementById('reportContent').innerHTML = html;
      } catch (err) {
        console.error('Error generating report:', err);
        alert('Failed to generate report.');
      }
    }

    function downloadPDF() {
      const element = document.getElementById('reportContent');
      const opt = {
        margin:       0.5,
        filename:     `Tutor_Session_Report_${new Date().toISOString().slice(0,10)}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2 },
        jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
      };
      html2pdf().from(element).set(opt).save();
    }
  </script>
</body>
</html>
