<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Messaging</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef1f5;
      margin: 0;
      padding: 0;
    }

    .messenger-container {
      max-width: 950px;
      margin: 50px auto;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #2e86de;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .chat-thread {
      height: 400px;
      overflow-y: auto;
      padding: 20px;
      background: #f9f9f9;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin: 10px 0;
      padding: 12px 16px;
      border-radius: 15px;
      max-width: 75%;
      word-wrap: break-word;
    }

    .sent {
      background: #d1e7dd;
      align-self: flex-end;
      border-bottom-right-radius: 0;
      text-align: right;
    }

    .received {
      background: #e2e3e5;
      align-self: flex-start;
      border-bottom-left-radius: 0;
      text-align: left;
    }

    .message small {
      font-size: 11px;
      color: #555;
      display: block;
      margin-top: 5px;
    }

    form {
      padding: 20px;
      border-top: 1px solid #ddd;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    form input, form textarea {
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    form button {
      padding: 10px;
      background: #2e86de;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    form button:hover {
      background: #1b4f72;
    }
  </style>
</head>
<body>

<div class="messenger-container">
  <div class="header">📩 Student Messaging</div>

  <div class="chat-thread" id="chatThread">Loading messages...</div>

  <form id="messageForm" enctype="multipart/form-data">
    <input type="text" id="subject" placeholder="Subject" required />
    <textarea id="body" rows="3" placeholder="Write your message..." required></textarea>
    <input type="file" id="attachment" />
    <button type="submit">Send Message</button>
  </form>
</div>

<script>
  let studentEmail = "";
  let tutorEmail = "";

  async function fetchStudentInfo() {
    try {
      const res = await fetch('/api/student/dashboard');
      const data = await res.json();
      studentEmail = data.student?.email?.trim().toLowerCase();
      tutorEmail = data.student?.assignedTutorEmail?.trim().toLowerCase();

      if (!tutorEmail) {
        const tutor = await fetch(`/api/tutors/${data.student?.assignedTutorId}`);
        const tutorData = await tutor.json();
        tutorEmail = tutorData?.email?.trim().toLowerCase();
      }

      console.log("📥 Loaded Emails → Student:", studentEmail, "| Tutor:", tutorEmail);
    } catch (err) {
      alert('Failed to load student info.');
      console.error(err);
    }
  }

  async function loadThread() {
    if (!studentEmail || !tutorEmail) return;

    console.log("📨 Fetching thread between", studentEmail, "and", tutorEmail);
    const res = await fetch(`/api/messages/thread/${studentEmail}/${tutorEmail}`);
    const messages = await res.json();

    const chatBox = document.getElementById('chatThread');
    chatBox.innerHTML = '';

    if (!messages.length) {
      chatBox.innerHTML = '<i>No messages yet. Start the conversation!</i>';
      return;
    }

    messages.forEach(msg => {
      const div = document.createElement('div');
      div.className = 'message ' + (msg.senderEmail.trim().toLowerCase() === studentEmail ? 'sent' : 'received');
      div.innerHTML = `
        <strong>${msg.subject}</strong><br>
        ${msg.body}
        ${msg.attachment ? `<br><a href="/uploads/${msg.attachment}" target="_blank">📎 Attachment</a>` : ''}
        <small>${new Date(msg.timestamp).toLocaleString()}</small>
      `;
      chatBox.appendChild(div);
    });

    chatBox.scrollTop = chatBox.scrollHeight;
  }

  document.getElementById('messageForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const formData = new FormData();
    formData.append('senderEmail', studentEmail);
    formData.append('recipientEmail', tutorEmail);
    formData.append('subject', document.getElementById('subject').value);
    formData.append('body', document.getElementById('body').value);
    if (document.getElementById('attachment').files[0]) {
      formData.append('attachment', document.getElementById('attachment').files[0]);
    }

    const res = await fetch('/api/messages/send', {
      method: 'POST',
      body: formData
    });

    if (res.ok) {
      document.getElementById('messageForm').reset();
      await loadThread();
    } else {
      alert('❌ Failed to send message.');
    }
  });

  window.addEventListener('DOMContentLoaded', async () => {
    await fetchStudentInfo();
    await loadThread();
  });
</script>

</body>
</html>
