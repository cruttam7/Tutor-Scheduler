<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Students</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Manage Students</h1>
  <div id="studentsTable"></div>

  <script>
    // Fetch students from the backend
    async function fetchStudents() {
      try {
        const response = await fetch('/admin/manage-students');
        const students = await response.json();

        const studentsTable = document.getElementById('studentsTable');
        studentsTable.innerHTML = '';

        students.forEach(student => {
          const row = document.createElement('div');
          row.innerHTML = `
            <div>
              <strong>${student.studentName}</strong> - ${student.email}
              <button onclick="editStudent('${student._id}')">Edit</button>
              <button onclick="deleteStudent('${student._id}')">Delete</button>
            </div>
          `;
          studentsTable.appendChild(row);
        });
      } catch (error) {
        console.error('Error fetching students:', error);
      }
    }

    // Edit student
    async function editStudent(studentId) {
      const studentName = prompt('Enter new student name:');
      const email = prompt('Enter new email:');
      if (studentName && email) {
        try {
          const response = await fetch(`/admin/manage-students/${studentId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ studentName, email })
          });
          const result = await response.json();
          alert(result.message);
          fetchStudents();
        } catch (error) {
          console.error('Error editing student:', error);
        }
      }
    }

    // Delete student
    async function deleteStudent(studentId) {
      if (confirm('Are you sure you want to delete this student?')) {
        try {
          const response = await fetch(`/admin/manage-students/${studentId}`, {
            method: 'DELETE'
          });
          const result = await response.json();
          alert(result.message);
          fetchStudents();
        } catch (error) {
          console.error('Error deleting student:', error);
        }
      }
    }

    document.addEventListener('DOMContentLoaded', fetchStudents);
  </script>
</body>
</html>
